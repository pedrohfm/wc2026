name: Deploy dashboard to GitHub Pages

# Deploys whatever is in site/ whenever you push it. Build the dashboard locally
# (python scripts/publish.py), commit the site/ folder, and push — this then
# publishes it. (Keeps your data and API keys off CI.)

on:
  push:
    branches: [main]
    paths: ["site/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
