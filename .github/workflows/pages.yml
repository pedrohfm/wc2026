# DISABLED — superseded by scheduled.yml (the single deploy path).
#
# This workflow used to also build a "github-pages" artifact and deploy to Pages.
# Running two Pages-deploying workflows on the same `pages` concurrency group made
# deploy-pages find "Multiple artifacts named github-pages" and fail. All deploys
# now go through .github/workflows/scheduled.yml (timer + manual + push).
#
# Kept as an inert stub only because the CI sandbox can't delete files. It has no
# schedule/push trigger and no deploy steps, so it never runs on its own and never
# touches Pages. Safe to delete this file from your machine:
#     git rm .github/workflows/pages.yml && git commit -m "Remove old Pages workflow"
name: Deploy dashboard to GitHub Pages (disabled)

on:
  workflow_dispatch: {}   # manual only; does nothing meaningful

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Disabled. Deploys are handled by scheduled.yml."
